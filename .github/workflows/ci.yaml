name: CI

on:
  push:
    branches: [main, "feat/*"]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: pip install uv
      - run: uv sync --all-groups
      - run: uv run ruff format --check src tests
      - run: uv run ruff check src tests
      - run: uv run pyright
      - run: uv run pytest --cov
